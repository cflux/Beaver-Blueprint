services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    environment:
      - BB_CORS_ORIGINS=["http://localhost"]

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mcp-server:
    build: ./mcp-server
    ports:
      - "8001:8001"
    volumes:
      - db-data:/app/data
    depends_on:
      - backend

volumes:
  db-data:
