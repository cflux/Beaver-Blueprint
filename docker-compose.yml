services:
  backend:
    container_name: beaver-blueprint-backend
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - db-data:/app/data
    environment:
      - BB_CORS_ORIGINS=${BB_CORS_ORIGINS:-["http://localhost"]}

  frontend:
    container_name: beaver-blueprint-frontend
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  mcp-server:
    container_name: beaver-blueprint-mcp
    build: ./mcp-server
    ports:
      - "${MCP_PORT:-8001}:8001"
    volumes:
      - db-data:/app/data
    depends_on:
      - backend

volumes:
  db-data:
